[User0]
Name: TopoSplit
Path: /configs/user/

[TopoSplit]
IsEnabled: true
Chi2Thresh: 1.25
IdxOffset: -3
# Too small these windows? [Merge] seems to recover the fragments quite well
BeamWindowY: 2
BeamWindowZ: 2
Debug: true

[BreakChi2]
IsEnabled: false
Chi2Thresh: 2.5
