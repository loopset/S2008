BeamWindowZ: 3
BreakLengthThresh: 3
DoClusterNotBeam: true
DoBreakMultiTracks: true
TrackChi2Thresh: 2.5
BeamWindowScale: 2

[Merge]
IsEnabled: true
DistThresh: 4
MinParallelFactor: 0.95
Chi2Factor: 1.5

[User1]
Name: RecRANSAC
Path: /configs/user/

[RecRANSAC]
IsEnabled: true
NIter: 150
MinVoxels: 11
DistThresh: 2

# Call merge again after RANSAC
[Merge]
IsEnabled: true
DistThresh: 4
MinParallelFactor: 0.95
Chi2Factor: 1.5

